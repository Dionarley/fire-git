version: '3.8'

services:
  dev:
    image: fire-git-dev
    build: .
    volumes:
      - .:/app
    environment:
      - GIT_NAME=${GIT_NAME:-Dev User}
      - GIT_EMAIL=${GIT_EMAIL:-dev@example.com}
      - APPLY_ADDITIONAL=${APPLY_ADDITIONAL:-true}
    stdin_open: true
    tty: true

  test:
    image: fire-git-dev
    build: .
    command: ./tests/run_tests.sh
    volumes:
      - .:/app
    environment:
      - GIT_NAME=test
      - GIT_EMAIL=test@test.com